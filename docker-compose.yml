version: '3.8'

services:
  erp-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alwardas-erp
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - RUST_LOG=info
    restart: unless-stopped
    networks:
      - erp-network

networks:
  erp-network:
    driver: bridge
