
version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: alwardas-db
    environment:
      POSTGRES_USER: alwardas
      POSTGRES_PASSWORD: alwardas_2017
      POSTGRES_DB: alwardas_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  erp-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alwardas-erp
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://alwardas:alwardas_2017@db:5432/alwardas_db
      PORT: "8080"
      RUST_LOG: info
    depends_on:
      - db
    restart: unless-stopped

volumes:
  pgdata:

